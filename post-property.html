<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Post Property | ZameenGhar</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

<link rel="stylesheet"
href="assets/css/style.css">

</head>

<body class="bg-light">
    <div class="container py-5">

        <div class="row justify-content-center">
    
            <div class="col-lg-10">
    
                <div class="card shadow-lg border-0 rounded-4">
    
                    <div class="card-body p-5">
    
                        <div class="text-center mb-5">
    
                            <h2 class="fw-bold text-success">
                                🏠 Post Your Property
                            </h2>
    
                            <p class="text-muted">
                                Fill the details below to publish your property.
                            </p>
                            <div class="row">

                                <div class="col-md-6 mb-3">
                            
                                    <label class="form-label fw-semibold">
                                        Property Title
                                    </label>
                            
                                    <input type="text"
                                           class="form-control"
                                           placeholder="e.g. Luxury Villa">
                            
                                </div>
                            
                                <div class="col-md-6 mb-3">
                            
                                    <label class="form-label fw-semibold">
                                        Property Type
                                    </label>
                            
                                    <select class="form-select">
                            
                                        <option>Select Property Type</option>
                            
                                        <option>Apartment</option>
                            
                                        <option>Villa</option>
                            
                                        <option>House</option>
                            
                                        <option>Plot</option>
                            
                                        <option>Farm Land</option>
                            
                                        <option>Commercial Shop</option>
                            
                                    </select>
                            
                                </div>
                            
                            </div>
                            <div class="row">

                                <div class="col-md-6 mb-3">
                            
                                    <label class="form-label fw-semibold">
                                        Purpose
                                    </label>
                            
                                    <select class="form-select">
                            
                                        <option>Select Purpose</option>
                                        <option>For Sale</option>
                                        <option>For Rent</option>
                            
                                    </select>
                            
                                </div>
                            
                                <div class="col-md-6 mb-3">
                            
                                    <label class="form-label fw-semibold">
                                        Price
                                    </label>
                            
                                    <input type="number"
                                           class="form-control"
                                           placeholder="Enter Property Price">
                            
                                </div>
                            
                            </div>
                            <div class="row">

                                <div class="col-md-6 mb-3">
                            
                                    <label class="form-label fw-semibold">
                                        State
                                    </label>
                            
                                    <select class="form-select">
                            
                                        <option>Select State</option>
                                        <option>Rajasthan</option>
                                        <option>Delhi</option>
                                        <option>Maharashtra</option>
                                        <option>Gujarat</option>
                            
                                    </select>
                            
                                </div>
                            
                                <div class="col-md-6 mb-3">
                            
                                    <label class="form-label fw-semibold">
                                        City
                                    </label>
                            
                                    <input type="text"
                                           class="form-control"
                                           placeholder="Enter City">
                            
                                </div>
                            
                            </div>
                            <div class="mb-3">

                                <label class="form-label fw-semibold">
                                    Full Address
                                </label>
                            
                                <textarea class="form-control"
                                          rows="3"
                                          placeholder="Enter complete property address"></textarea>
                            
                            </div>
                            <div class="row">

                                <div class="col-md-3 mb-3">
                            
                                    <label class="form-label fw-semibold">
                                        Area (Sq.ft)
                                    </label>
                            
                                    <input type="number"
                                           class="form-control"
                                           placeholder="1800">
                            
                                </div>
                            
                                <div class="col-md-3 mb-3">
                            
                                    <label class="form-label fw-semibold">
                                        Bedrooms
                                    </label>
                            
                                    <input type="number"
                                           class="form-control"
                                           placeholder="3">
                            
                                </div>
                            
                                <div class="col-md-3 mb-3">
                            
                                    <label class="form-label fw-semibold">
                                        Bathrooms
                                    </label>
                            
                                    <input type="number"
                                           class="form-control"
                                           placeholder="2">
                            
                                </div>
                            
                                <div class="col-md-3 mb-3">
                            
                                    <label class="form-label fw-semibold">
                                        Parking
                                    </label>
                            
                                    <select class="form-select">
                            
                                        <option>Yes</option>
                                        <option>No</option>
                            
                                    </select>
                            
                                </div>
                            
                            </div>
                            <div class="mb-4">

                                <label class="form-label fw-semibold">
                                    Property Description
                                </label>
                            
                                <textarea class="form-control"
                                          rows="5"
                                          placeholder="Describe your property in detail..."></textarea>
                            
                            </div>
                            <div class="mb-4">

                                <label class="form-label fw-semibold">
                                    Upload Property Images
                                </label>
                            
                                <input type="file"
                                       class="form-control"
                                       multiple>
                            
                                <small class="text-muted">
                                    You can select multiple images.
                                </small>
                            
                            </div>
                            <div class="row">

                                <div class="col-md-4 mb-3">
                            
                                    <label class="form-label fw-semibold">
                                        Contact Name
                                    </label>
                            
                                    <input type="text"
                                           class="form-control"
                                           placeholder="Enter Contact Name">
                            
                                </div>
                            
                                <div class="col-md-4 mb-3">
                            
                                    <label class="form-label fw-semibold">
                                        Mobile Number
                                    </label>
                            
                                    <input type="tel"
                                           class="form-control"
                                           placeholder="Enter Mobile Number">
                            
                                </div>
                            
                                <div class="col-md-4 mb-3">
                            
                                    <label class="form-label fw-semibold">
                                        WhatsApp Number
                                    </label>
                            
                                    <input type="tel"
                                           class="form-control"
                                           placeholder="Enter WhatsApp Number">
                            
                                </div>
                            
                            </div>
                            <div class="text-center mt-5">

                                <button class="btn btn-success btn-lg px-5">
                            
                                    <i class="bi bi-cloud-upload-fill"></i>
                            
                                    Publish Property
                            
                                </button>
                            
                            </div>
                            
    
                        </div>
    
                    </div>
    
                </div>
    
            </div>
    
        </div>
    
    </div>


</body>

</html>
